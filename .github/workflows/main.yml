name: Build Windows Exe

on:
  workflow_dispatch:

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Clean conflicting OpenCV packages
        shell: bash
        run: |
          pip uninstall -y opencv-python opencv-contrib-python opencv-python-headless opencv-contrib-python-headless || true

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test imports
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import numpy; import numpy.core.multiarray; print('numpy ok', numpy.__version__)"
          python -c "import cv2; print('cv2 ok', cv2.__version__)"
          python -c "from paddleocr import PaddleOCR; print('paddleocr ok')"

      - name: Build with spec
        run: pyinstaller --noconfirm --clean id_ocr.spec

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDCardOCRTool_Windows
          path: dist/IDCardOCRTool/
